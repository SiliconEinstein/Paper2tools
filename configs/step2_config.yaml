# Step2 配置: 工具信息注入

# TOS：桶名、密钥、endpoint 等见 .env（TOS_BUCKET、TOS_ACCESS_KEY、TOS_SECRET_KEY、TOS_ENDPOINT）
tos:
  region: "cn-beijing"
  xml_source_prefix: "paper_ocr/xml/"    # reasoning_chain.xml 所在目录
  md_prefix: "paper_ocr/md/"             # 论文 MD 文件所在目录
  output_prefix: "paper_ocr/tools/v2/reasoning_chain_refine/"  # 输出目录

# LLM 配置
llm:
  provider: "gpt5_mini"                  # 使用的 LLM provider（对应 config.yaml 中的 key）
  temperature: 0.0
  max_retries: 3
  timeout: 120

# Prompt 配置
prompt:
  template_path: "prompts/step2_extract_tools.md"  # Prompt 模板路径

# 运行参数
runtime:
  verbose: true
  batch_size: 50                         # 批量处理论文数
  max_workers: 300                        # 并发数
  skip_existing: true                    # 跳过已存在的输出
