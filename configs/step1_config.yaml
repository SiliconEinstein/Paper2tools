# Step1 配置: 文本向量化与语义聚类

# 数据路径
data:
  journal_config_path: "configs/domain_journals.yaml"
  target_domain: "bioinformatics"
  cache_dir: "data/cache"
  output_dir: "data/step1_output"
  lance_db_dir: "data/lance_db"
  force_rebuild_ids: false
  force_reload_chains: false
  batch_size: 500
  max_workers: 300
  verbose: true

# 向量化参数（API_URL / ACCESS_KEY / DASHSCOPE_API_KEY 见 .env）
vectorizer:
  model: "text-embedding-v4"
  dimension: 1024
  concurrency: 50
  max_retries: 5
  http_timeout: 30

# 聚类参数
clustering:
  algorithm: "kmeans"
  n_clusters: 30000
  auto_k:
    min_k: 5
    max_k: 5000
    method: "silhouette"
  umap:
    enabled: false
    n_components: 50
    n_neighbors: 15
    min_dist: 0.1
    metric: 'cosine'
  hdbscan:
    min_cluster_size: 100
    min_samples: 10

# 运行参数
runtime:
  random_seed: 42
  verbose: true
