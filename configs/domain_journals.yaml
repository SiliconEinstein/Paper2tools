# 按学科领域分组的期刊列表
# 期刊名必须与 batch_csv 中 pdf_path 里的名称完全一致
# 用途: 按领域从 TOS 筛选论文进行流水线处理

bioinformatics:
  label: "生物信息学"
  journals:
    # --- 生物信息学 / 计算生物学 核心期刊 (9 个，用于初始验证) ---
    - "Bioinformatics"                          # 16,793 篇 | Oxford, 生信旗舰
    - "PLOS Computational Biology"              #  3,475 篇 | 计算生物学
    - "Genome Research"                         #  4,818 篇 | 基因组学方法与分析
    - "Genome Biology"                          #  6,058 篇 | 基因组学综合
    - "Nucleic Acids Research"                  # 43,043 篇 | 核酸/数据库/工具
    - "GigaScience"                             #    861 篇 | 大数据生物学
    - "Molecular Systems Biology"               #    817 篇 | 系统生物学
    - "Cell Systems"                            #    721 篇 | 系统生物学 (Cell子刊)

# 超导领域（期刊名须与 batch_csv 中 pdf_path 段一致，常见为 IOP «Superconductivity»）
superconductivity:
  label: "超导"
  journals:
    - "Superconductivity"

materials_science:
  label: "材料科学"
  journals:
    - "Nature Materials"
    - "Acta Materialia"
    - "Chemistry of Materials"
    - "Journal of Materials Science"
    - "Computational Materials Science"

environmental_science:
  label: "环境科学"
  journals:
    - "Nature Sustainability"
    - "Water Research"
    - "Environmental Pollution"
    - "Atmospheric Chemistry and Physics"
    - "Journal of Hazardous Materials"


mathematics:
  label: "数学"
  journals:
    - "Annals of Mathematics"
    - "Inventiones Mathematicae"
    - "Journal of the American Mathematical Society"
    - "Communications on Pure and Applied Mathematics"
    - "SIAM Review"
    - "SIAM Journal on Numerical Analysis"
    - "Mathematics of Computation"
    - "Numerische Mathematik"
    - "Foundations of Computational Mathematics"

fluid_mechanics:
  label: "流体力学"
  journals:
    - "Journal of Fluid Mechanics"
    - "Physics of Fluids"
    - "International Journal of Multiphase Flow"
    - "Journal of Computational Physics"
    - "Computers & Fluids"
    - "Experiments in Fluids"
