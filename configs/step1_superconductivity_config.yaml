# Step1 配置: 超导领域
#
# 聚类算法改为 agglomerative（受约束凝聚聚类，两阶段近似），
# 用于在大规模样本上降低 HDBSCAN 的耗时。

data:
  journal_config_path: "configs/domain_journals.yaml"
  target_domain: "superconductivity"
  cache_dir: "data/Superconductivity/cache"
  output_dir: "data/Superconductivity/step1_output_agglomerative_v2"
  lance_db_dir: "data/lance_db"
  force_rebuild_ids: false
  force_reload_chains: false
  batch_size: 500
  max_workers: 300
  verbose: true

vectorizer:
  model: "text-embedding-v4"
  dimension: 512
  concurrency: 10
  max_retries: 5
  http_timeout: 30
  api_batch_size: 10

clustering:
  algorithm: "agglomerative"
  # agglomerative 当前为 CPU 实现；device 字段仅用于统一配置展示
  device: auto

  agglomerative:
    max_size: 500
    min_pair_sim: 0.55
    max_n_exact: 4096
    micro_k: 3000
    micro_batch_size: 8192
    micro_max_iter: 100

  hdbscan:
    min_cluster_size: 15
    min_samples: 5
    metric: "cosine"
    cluster_selection_epsilon: 0.0
    cluster_selection_method: "eom"
    # 仅 device=gpu/auto 且使用 cuML 时生效：nn_descent 通常比 brute_force 更快
    cuml_build_algo: "nn_descent"

  umap:
    enabled: false
    n_components: 50
    n_neighbors: 15
    min_dist: 0.1
    metric: 'cosine'

  cosine_metrics:
    enabled: true
    subsample_n: 5000
    max_points_per_cluster: 32
    cosine_split_threshold: 0.85
    sim_block_rows: 256
    random_state: 42

  selection:
    top_percent: 0.01
    max_per_cluster: 50

runtime:
  random_seed: 42
  verbose: true
  skip_vectorization: true
