# Step3 配置: Workflow 提取
# 从任意文本中提取结构化 workflow

# 数据路径
data:
  input_path: "data/input"               # 输入文件或目录（支持 .txt/.xml/.json/.md）
  output_dir: "data/step3_output"        # 输出目录

# Workflow 提取参数
extraction:
  temperature: 0.3                       # LLM 温度参数（越低越稳定）

# 运行参数
runtime:
  verbose: true                          # 是否打印详细进度
  concurrency: 10                        # LLM 并发数
  batch_size: 500                         # 批量处理文本数
