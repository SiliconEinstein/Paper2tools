# Step3 配置: 工作流总结
# 在此文件中定义 Step3 的所有可配置参数

# 数据路径
data:
  enriched_xml_dir: "data/step2_output"  # Step2 输出的增强 XML 目录
  tools_json_dir: "data/input"           # _tools_extract_result.json 所在目录
  output_dir: "data/step3_output"        # 输出目录

# Workflow 提取参数
extraction:
  source: "ptlink"                       # 选项: ptlink, enriched_xml, both
  include_single_tool: true              # 是否包含单工具 workflow
  include_prereq: true                   # 是否包含 prereq 中的工具

# Workflow 聚合参数
aggregation:
  similarity_method: "tool_sequence"     # 选项: tool_sequence, tool_set, semantic
  similarity_threshold: 0.8             # 聚合相似度阈值
  min_occurrences: 2                     # 最少出现次数（才被视为"典型"workflow）
  # 工具名匹配
  tool_matching:
    use_alias: true                      # 使用工具别名进行匹配
    fuzzy_threshold: 0.85               # 工具名模糊匹配阈值

# 输出参数
output:
  format: "json"                         # 选项: json, yaml, markdown
  include_examples: true                 # 是否包含示例论文
  max_examples_per_workflow: 5          # 每个 workflow 最多保留几个示例
  generate_summary: true                 # 是否生成自然语言描述

# 运行参数
runtime:
  verbose: true
  batch_size: 1000                       # 批量处理论文数
