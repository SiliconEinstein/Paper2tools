# Step1 配置: 随机5万条数据测试

# 数据路径
data:
  mode: "random_sample"  # 新增模式：随机采样
  sample_size: 50000
  cache_dir: "data/cache_random50k"
  output_dir: "data/step1_output_random50k"
  lance_db_dir: "data/lance_db"
  force_rebuild_ids: false
  force_reload_chains: false
  batch_size: 500
  max_workers: 10
  verbose: true

# 向量化参数（API_URL / ACCESS_KEY / DASHSCOPE_API_KEY 见 .env）
vectorizer:
  model: "text-embedding-v1"
  dimension: 512
  concurrency: 50
  max_retries: 5
  http_timeout: 30
  api_batch_size: 25  # 每次 API 请求批量发送的文本数（减少 HTTP 往返）

# 聚类参数
clustering:
  algorithm: "agglomerative"
  random_seed: 42
  # kmeans 时有效: cpu | gpu | auto
  device: auto
  # kmeans 时有效
  n_clusters: 30000
  batch_size: 10000
  max_iter: 300
  # 受约束凝聚聚类（5w 样本走两阶段：MiniBatch 微簇 + 质心上合并）
  agglomerative:
    max_size: 50
    min_pair_sim: 0.45
    max_n_exact: 4096
    micro_k: 3000
    micro_batch_size: 8192
    micro_max_iter: 100
  auto_k:
    min_k: 5
    max_k: 50
    method: "silhouette"
  umap:
    enabled: false
    n_components: 50
    n_neighbors: 15
    min_dist: 0.1
    metric: 'cosine'
  hdbscan:
    min_cluster_size: 100
    min_samples: 10
  selection:
    top_percent: 0.1
    max_per_cluster: 10

# 运行参数
runtime:
  random_seed: 42
  verbose: true
